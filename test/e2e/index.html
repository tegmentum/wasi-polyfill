<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASIP2 Polyfill Browser Tests</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }
      .test {
        padding: 10px;
        margin: 5px 0;
        border-radius: 4px;
      }
      .pass {
        background: #d4edda;
        color: #155724;
      }
      .fail {
        background: #f8d7da;
        color: #721c24;
      }
      .pending {
        background: #fff3cd;
        color: #856404;
      }
      pre {
        background: #f4f4f4;
        padding: 10px;
        overflow-x: auto;
      }
      #results {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>WASIP2 Polyfill Browser Tests</h1>
    <div id="status">Loading...</div>
    <div id="results"></div>

    <script type="module" src="./test-runner.ts"></script>
  </body>
</html>
